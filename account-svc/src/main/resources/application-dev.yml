# Development configuration for Account Service
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/staffjoy_account?useSSL=false&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL5InnoDBDialect

staffjoy:
  common:
    sentry-dsn: ""
    deploy-env: dev
  account-service-endpoint: http://localhost:8080

logging:
  level:
    com.king.account: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE